name: Deploy Dashboard

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into dashboard
        run: |
          sed -i 's|%%GOOGLE_API_KEY%%|${{ secrets.GOOGLE_API_KEY }}|g' index.html
          sed -i 's|%%OAUTH_CLIENT_ID%%|${{ secrets.OAUTH_CLIENT_ID }}|g' index.html
          sed -i 's|%%HL_TOKEN%%|${{ secrets.HL_TOKEN }}|g' index.html
          sed -i 's|%%JOB_TRACKER_SHEET_ID%%|${{ secrets.JOB_TRACKER_SHEET_ID }}|g' index.html
          sed -i 's|%%WC_SHEET_ID%%|${{ secrets.WC_SHEET_ID }}|g' index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
