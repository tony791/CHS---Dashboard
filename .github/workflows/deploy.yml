name: Deploy Dashboard
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject secrets
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          HL_TOKEN: ${{ secrets.HL_TOKEN }}
          JOB_TRACKER_SHEET_ID: ${{ secrets.JOB_TRACKER_SHEET_ID }}
          WC_SHEET_ID: ${{ secrets.WC_SHEET_ID }}
        run: |
          python3 << 'PYEOF'
          import os
          with open('index.html', 'r') as f:
              html = f.read()
          html = html.replace('%%GOOGLE_API_KEY%%', os.environ['GOOGLE_API_KEY'])
          html = html.replace('%%OAUTH_CLIENT_ID%%', os.environ['OAUTH_CLIENT_ID'])
          html = html.replace('%%HL_TOKEN%%', os.environ['HL_TOKEN'])
          html = html.replace('%%JOB_TRACKER_SHEET_ID%%', os.environ['JOB_TRACKER_SHEET_ID'])
          html = html.replace('%%WC_SHEET_ID%%', os.environ['WC_SHEET_ID'])
          with open('index.html', 'w') as f:
              f.write(html)
          print("Secrets injected successfully")
          PYEOF
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
