name: Jobber Sync

on:
  schedule:
    # Every 2 hours on the hour (UTC). Gives Jobber's rate-limit budget time
    # to reset between runs. Manual triggers via workflow_dispatch should wait
    # at least 15 min after a scheduled run to avoid throttling.
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests pynacl --quiet --break-system-packages

      - name: Run Jobber Sync
        env:
          JOBBER_CLIENT_ID: ${{ secrets.JOBBER_CLIENT_ID }}
          JOBBER_CLIENT_SECRET: ${{ secrets.JOBBER_CLIENT_SECRET }}
          JOBBER_REFRESH_TOKEN: ${{ secrets.JOBBER_REFRESH_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          JOB_TRACKER_SHEET_ID: ${{ secrets.JOB_TRACKER_SHEET_ID }}
          WC_SHEET_ID: ${{ secrets.WC_SHEET_ID }}
          GH_TOKEN_ROTATOR: ${{ secrets.GH_TOKEN_ROTATOR }}
        run: python3 jobber_sync.py
